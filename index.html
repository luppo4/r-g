<!DOCTYPE html>
<html lang="en">
    <head>
        <title>R + G ♡</title>
        <style>
            body {
                font-family: 'Trebuchet MS', sans-serif;
                text-align: center;
                background: radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px), #aa7e8c;
                background-size: 30px 30px;
                padding: 20px;
            }
            table {
                margin: 20px auto;
                border-collapse: collapse;
                border: 3px solid #c05e8f;
                border-radius: 20px;
                overflow: hidden;
            }
            th, td {
                border: 1px solid #ccc;
                padding: 10px 15px;
                width: 40px;
                height: 40px;
                text-align: center;
            }
            th {
                background-color: #ffb6c1;
                font-weight: bold;
            }
            td {
                background-color: white;
            }
            .crossed {
                text-decoration: line-through;
                font-weight: bold;
                text-decoration-thickness: 3px;
            }
            .collage {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 14px;
                justify-items: center;
                padding: 20px 0;
                max-width: 960px;
                margin: 30px auto 0;
            }
            .collage img {
                width: 100%;
                max-width: 280px;
                border: none;
                outline: none;
                border-radius: 16px;
                box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
                transform: rotate(var(--r, 0deg));
            }
            table {
                margin: 20px auto;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid #ccc;
                padding: 10px 15px;
                width: 40px;
                height: 40px;
                text-align: center;
            }
            th {
                background-color: #ffb6c1;
                font-weight: bold;
            }
            .crossed {
                text-decoration: line-through;
                font-weight: bold;
            }
            .sparkle {
                animation: sparkle 1.5s infinite ease-in-out;
            }
            @keyframes sparkle {
                0%, 100% { opacity: 1; transform: scale(1); }
                50% { opacity: 0.5; transform: scale(1.2); }
            }
        </style>
    </head>
